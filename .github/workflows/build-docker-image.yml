name: Build and Push to GHCR

on:
  push:
    branches: [ "main" ]
    # 当这些文件变化时触发构建
    paths:
      - 'Dockerfile'
      - '**.go'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    branches: [ "main" ]
  # 支持手动触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # 这一项至关重要，赋予写入镜像的权限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 登录 GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # 系统自动生成的 Token，无需手动配置

      # 设置 Docker Buildx (支持多平台构建)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 构建并推送镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 同时支持 amd64 (PC) 和 arm64 (Mac/服务器)
          platforms: linux/amd64,linux/arm64
          # 镜像标签：ghcr.io/你的用户名/仓库名:latest
          tags: ghcr.io/${{ github.repository }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Cursor2API Go Server
          # 利用 GitHub Actions 缓存加速构建
          cache-from: type=gha
          cache-to: type=gha,mode=max
